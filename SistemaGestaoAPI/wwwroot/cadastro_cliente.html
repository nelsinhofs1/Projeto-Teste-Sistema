<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Cliente - Gestão Pro</title>
    <link rel="stylesheet" href="css/EstiloGeral.css?v=1.0">
</head>
<body>

<div class="sidebar">
    <h2>📦 Gestão Pro</h2>
    <hr>
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="clientes.html">👥 Clientes</a>
    <a href="estoque.html">📋 Estoque</a>
    <a href="pedido.html">🛒 Novo Pedido</a>
    <a href="relatorios.html">📊 Relatórios</a>    
    <a href="financeiro.html" class="botao-final">💰 CAIXA - FINANCEIRO</a> 
</div>

    <div class="content centralizar-item">
        <div class="card-formulario" style="max-width: 450px;">
        <h2 style="text-align: center; color: #2c3e50; margin-bottom: 20px;">👤 Novo Cadastro de Cliente</h2>
        
        <div class="form-group">
            <label>Nome Completo / Razão Social</label>
            <input type="text" id="nomeCliente" placeholder="Ex: João da Silva ou Empresa LTDA">
        </div>
        
        <div class="form-group">
            <label>Endereço Completo</label>
            <input type="text" id="enderecoCliente" placeholder="Rua, Número, Bairro, Cidade - UF">
        </div>
        
        <div class="form-group">
            <label>Telefone (Opcional)</label>
            <input type="text" id="telefoneCliente" placeholder="(00) 00000-0000">
        </div>

        <button class="btn-sucesso" style="width: 100%; margin-top: 10px;" onclick="salvarCliente()">
            CADASTRAR CLIENTE
        </button>
        
        <a href="clientes.html" style="display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none; font-size: 14px;">
            ⬅ Cancelar e Voltar
        </a>
    </div>
</div>

<script src="js/cadastro_cliente.js"></script>

</body>
</html>
