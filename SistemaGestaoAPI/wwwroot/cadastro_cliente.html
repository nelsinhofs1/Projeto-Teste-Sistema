<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Cliente - Gestão Pro</title>
    <link rel="stylesheet" href="css/EstiloGeral.css?v=1.0">
</head>
<body>

<div class="sidebar">
    <h2>📦 Gestão Pro</h2>
    <hr>
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="clientes.html">👥 Clientes</a>
    <a href="estoque.html">📋 Estoque</a>
    <a href="pedido.html">🛒 Novo Pedido</a>
    <a href="financeiro.html" class="botao-final">💰 CAIXA - FINANCEIRO</a> 
</div>

<div class="content">
    <div class="card-tabela" style="max-width: 500px; width: 100%;">
        <h2 style="text-align: center; color: #2c3e50;">👤 Novo Cadastro de Cliente</h2>
        
        <label style="display: block; font-weight: bold; margin-top: 15px;">Nome Completo / Razão Social</label>
        <input type="text" id="nomeCliente" placeholder="Ex: João da Silva ou Empresa LTDA">
        
        <label style="display: block; font-weight: bold; margin-top: 15px;">Endereço Completo</label>
        <input type="text" id="enderecoCliente" placeholder="Rua, Número, Bairro, Cidade - UF">
        
        <label style="display: block; font-weight: bold; margin-top: 15px;">Telefone (Opcional)</label>
        <input type="text" id="telefoneCliente" placeholder="(00) 00000-0000">

        <button class="btn-novo" style="width: 100%; margin-top: 20px; height: 45px; background-color: #27ae60 !important;" onclick="salvarCliente()">
            CADASTRAR CLIENTE
        </button>
        
        <a href="clientes.html" style="display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none; font-size: 14px;">
            ⬅ Cancelar e Voltar
        </a>
    </div>
</div>

<script src="js/cadastro_cliente.js"></script>

</body>
</html>
