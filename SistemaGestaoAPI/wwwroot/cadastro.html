<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Produto - Gestão Pro</title>
    <link rel="stylesheet" href="css/EstiloGeral.css?v=1.1">
</head>
<body>

<div class="sidebar">
    <h2>📦 Gestão Pro</h2>
    <hr>
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="clientes.html">👥 Clientes</a>
    <a href="estoque.html">📋 Estoque</a>
    <a href="pedido.html">🛒 Novo Pedido</a>
    <a href="financeiro.html" class="botao-final">💰 CAIXA - FINANCEIRO</a> 
</div>

<div class="content" style="justify-content: center; align-items: center; min-height: 100vh;">
    <div class="card-formulario" style="max-width: 450px;">
        <h2 style="text-align: center; color: #2c3e50; margin-bottom: 20px;">➕ Cadastrar Produto</h2>
        
        <div class="form-group">
            <label>Nome do Produto</label>
            <input type="text" id="nome" placeholder="Ex: Monitor Gamer 24p">
        </div>
        
        <div class="form-group">
            <label>Quantidade em Estoque</label>
            <input type="number" id="estoque" placeholder="0">
        </div>
        
        <div class="form-group">
            <label>Preço de Custo (R$)</label>
            <input type="number" id="custo" step="0.01" placeholder="0.00">
        </div>
        
        <div class="form-group">
            <label>Imposto (%)</label>
            <input type="number" id="imposto" step="0.1" placeholder="Ex: 10">
        </div>
        
        <div class="form-group">
            <label>Margem de Lucro (%)</label>
            <input type="number" id="margem" step="0.1" placeholder="Ex: 50">
        </div>
        
        <button class="btn-sucesso" style="width: 100%; margin-top: 10px;" onclick="enviarParaApi()">
            SALVAR NO ESTOQUE
        </button>
        
        <a href="estoque.html" style="display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none; font-size: 14px;">
            ⬅ Voltar para o Estoque
        </a>
    </div>
</div>

<script src="js/cadastro_produto.js"></script>

</body>
</html>
