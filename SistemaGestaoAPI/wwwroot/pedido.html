<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Pedido - Gestão Pro</title>
    <link rel="stylesheet" href="css/EstiloGeral.css?v=1.1">
</head>
<body>

    <div class="sidebar">
        <h2>📦 Gestão Pro</h2>
        <hr>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="clientes.html">👥 Clientes</a>
        <a href="estoque.html">📋 Estoque</a>
        <a href="pedido.html">🛒 Novo Pedido</a>
        <a href="financeiro.html" class="botao-final">💰 CAIXA</a> 
    </div>

    <div class="content">
        <div class="card">
            <h1 id="tituloPagina">📝 Criar Novo Pedido / Orçamento</h1>
            
            <div class="form-group">
                <label>Tipo de Operação</label>
                <select id="tipoOperacao">
                    <option value="pedido">Pedido de Venda (Baixa Estoque)</option>
                    <option value="orcamento">Orçamento (Apenas Salvar Local)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Selecionar Cliente</label>
                <input list="listaClientes" id="buscaCliente" placeholder="Busque o cliente pelo nome...">
                <datalist id="listaClientes"></datalist>
            </div>

            <div style="display: flex; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; align-items: flex-end; margin-bottom: 20px;">
                <div style="flex: 3;">
                    <label style="display:block; font-weight:bold;">Selecionar Produto</label>
                    <input list="listaProdutos" id="buscaNome" placeholder="Busque pelo nome..." style="width:100%; padding:10px;">
                    <datalist id="listaProdutos"></datalist>
                </div>
                <div style="flex: 1;">
                    <label style="display:block; font-weight:bold;">Qtd</label>
                    <input type="number" id="qtdItem" value="1" min="1" style="width:100%; padding:10px;">
                </div>
                <button type="button" onclick="adicionarAoCarrinho()" style="background:#3498db; color:white; border:none; padding:12px 20px; border-radius:6px; cursor:pointer; font-weight:bold;">ADICIONAR</button>
            </div>

            <table id="tabelaItens">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>V. Unitário</th>
                        <th>Total</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <div class="footer-pedido" style="text-align: right; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px;">
                <h2 style="color: #27ae60;">Total Geral: R$ <span id="valorTotal">0.00</span></h2>
                <button type="button" class="btn-finalizar" id="btnFinalizar" onclick="finalizarOperacao()">FINALIZAR OPERAÇÃO</button>
            </div>
        </div>
    </div>

    <script src="js/pedido.js"></script>
</body>
</html>
