<head>
    <meta charset="UTF-8">

</head>
<body>

<div class="sidebar">
    <div class="logo-container">
        <h2>📦 Gestão Pro</h2>

    <nav>

<div class="content">
    <div class="header-pagina">
        <h1>Operação de Venda</h1>
    </div>

    <div class="container-central">
        <div class="card-formulario">
            <h2>🛒 Frente de Caixa</h2>
            <p class="subtitulo">Registre a venda rápida abaixo</p>
            
            <div class="form-group">
                <label for="produtoId">ID do Produto</label>
                <input type="number" id="produtoId" placeholder="Digite o código">
            </div>

            <div class="form-group">
                <label for="quantidade">Quantidade</label>
                <input type="number" id="quantidade" value="1">
            </div>
            
            <button class="btn-sucesso" onclick="realizarVenda()">Finalizar Venda</button>
            
            <p id="mensagem"></p>
        </div>
    </div>
</div>
